<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Adaptive Cache System</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #13161f;
      --surface2: #1a1e2a;
      --border: #252a38;
      --accent: #00d4ff;
      --text: #e2e8f0;
      --text2: #8892a4;
      --text3: #4a5568;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 24px;
      background-image:
        radial-gradient(ellipse at 10% 20%, rgba(0,212,255,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 80%, rgba(124,58,237,0.05) 0%, transparent 50%);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .header-left h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .header-left h1 span { color: var(--accent); }
    .header-left p { font-family: var(--mono); font-size: 11px; color: var(--text2); margin-top: 4px; }
    
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-link { color: var(--text2); text-decoration: none; font-family: var(--mono); font-size: 14px; font-weight: 600; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: var(--accent); }

    .login-container {
      max-width: 400px;
      margin: 60px auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .login-container h2 {
      text-align: center; margin-bottom: 24px; font-weight: 700;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block; font-family: var(--mono); font-size: 11px; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
    }
    .form-group input {
      width: 100%; padding: 12px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-family: var(--sans); font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
    }
    .btn-submit {
      width: 100%; padding: 12px; margin-top: 10px;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: 8px;
      font-family: var(--mono); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-submit:hover {
      box-shadow: 0 0 15px rgba(0,212,255,0.4);
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>⚙ Adaptive <span>Cache</span> Management System</h1>
    <p>// Interactive Cache Simulation Dashboard</p>
  </div>
  <nav class="nav-links">
    <!-- Links hidden on login page -->
    <a href="https://github.com/ritsilml/Adaptive-Cache-System.git" class="nav-link" target="_blank">GitHub</a>
  </nav>
  <div style="width: 150px;"></div> <!-- Spacer to balance header -->
</header>

<div class="login-container">
  <h2>Welcome Back</h2>
  <form method="POST" action="/login">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="admin@example.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required />
    </div>
    <button type="submit" class="btn-submit">Log In</button>
  </form>
</div>

</body>
</html>
